name: Security & Compliance

on:
  pull_request:
    paths:
      - infra/terraform/**
      - "**/Dockerfile*"
      - requirements*.txt
      - "**/*.py"
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-filesystem:
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  trivy-image:
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image for scanning
        if: ${{ hashFiles('ci/docker/Dockerfile.api') != '' && hashFiles('api/**') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ci/docker/Dockerfile.api
          push: false
          load: true
          tags: indicagri-api:scan

      - name: Run Trivy image scan
        if: ${{ hashFiles('ci/docker/Dockerfile.api') != '' && hashFiles('api/**') != '' }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: indicagri-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  checkov-iac:
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov scan
        if: ${{ hashFiles('infra/terraform/**/*.tf') != '' }}
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false
          download_external_modules: true

      - name: Upload Checkov SARIF
        if: ${{ always() && hashFiles('infra/terraform/**/*.tf') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
