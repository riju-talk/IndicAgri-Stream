name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt not found, skipping dependency install."
          fi

      - name: Install protolint
        if: ${{ hashFiles('schemas/**') != '' }}
        run: |
          curl -sSL https://raw.githubusercontent.com/yoheimuta/protolint/master/install/protolint.sh | bash
          sudo mv ./bin/protolint /usr/local/bin/protolint

      - name: Run lint and tests
        run: bash ci/scripts/run-tests.sh all

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, flink, airflow]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          PUSH_IMAGE: "true"
          REGISTRY: ${{ env.IMAGE_NAMESPACE }}
        run: bash ci/scripts/build-docker.sh "${{ matrix.service }}" "${{ github.sha }}" "${{ github.ref_name }}"

  schema-compatibility:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Buf
        if: ${{ hashFiles('schemas/**') != '' }}
        uses: bufbuild/buf-setup-action@v1

      - name: Validate schema compatibility
        run: bash ci/scripts/validate-schemas.sh main
