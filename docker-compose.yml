version: '3.8'

networks:
  agri-net:
    driver: bridge

services:
  # --- Message Broker ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [agri-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [agri-net]

  # --- Storage ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agri_features
      POSTGRES_USER: agri_user
      POSTGRES_PASSWORD: agri_pass
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [agri-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: agri_minio
      MINIO_ROOT_PASSWORD: agri_minio_pass
    volumes: ["miniodata:/data"]
    networks: [agri-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [agri-net]

  # --- Orchestration ---
  airflow-init:
    image: apache/airflow:2.7.3
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://agri_user:agri_pass@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    depends_on: [postgres]
    networks: [agri-net]

  airflow-webserver:
    image: apache/airflow:2.7.3
    command: webserver
    ports: ["8080:8080"]
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://agri_user:agri_pass@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    depends_on: [airflow-init]
    networks: [agri-net]

  airflow-scheduler:
    image: apache/airflow:2.7.3
    command: scheduler
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://agri_user:agri_pass@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    depends_on: [airflow-init]
    networks: [agri-net]

  # --- Stream Processing ---
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    ports: ["8081:8081"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    networks: [agri-net]

  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    networks: [agri-net]

volumes:
  pgdata:
  miniodata: